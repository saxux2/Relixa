name: Relixa Complete CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  frontend-audit:
    name: Frontend Build & Validation
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      
    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Required Packages
      run: npm install
      
    - name: Perform Code Linting
      run: npm run lint --if-present || true
      
    - name: Execute Production Build
      run: npm run build


  soroban-contract-audit:
    name: Blockchain Soroban Verification
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./blockchain/soroban-contracts

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      
    - name: Initialize Rust Toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: wasm32-unknown-unknown
        override: true
        
    - name: Verify Cargo Compilation Integrity
      run: cargo check --target wasm32-unknown-unknown

    - name: Build WebAssembly (WASM) Release
      run: cargo build --target wasm32-unknown-unknown --release

  continuous-deployment-gate:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [frontend-audit, soroban-contract-audit]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      
    - name: CI/CD Health Certification
      run: |
        echo "✅ Frontend React Components constructed successfully."

        echo "✅ Soroban Smart Contracts compiled into web assembly flawlessly."
        echo "🚀 Repository is certified ready. Auto-deployment integrations (like Vercel) can now safely proceed."
